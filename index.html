<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d120e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bioespeleo">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Ficha de Bioespeleologia</title>
<style>
  :root{
    --bg:#0d120e;
    --panel:#151c16;
    --panel-2:#1c241d;
    --line:#2a352b;
    --txt:#e8efe6;
    --muted:#8aa08c;
    --accent:#c6f24e;      /* headlamp green-yellow */
    --accent-dim:#7d9a2e;
    --sim:#3fb96b;
    --nao:#e25c4a;
    --shadow:0 6px 24px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1200px 400px at 50% -120px, rgba(198,242,78,.07), transparent 70%),
      var(--bg);
    color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:16px;line-height:1.4;
    padding-bottom:120px;
    -webkit-text-size-adjust:100%;
  }
  /* ---------- top bar ---------- */
  header.app{
    position:sticky;top:0;z-index:50;
    background:rgba(13,18,14,.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    padding:env(safe-area-inset-top) 0 0 0;
  }
  .bar{display:flex;align-items:center;gap:10px;padding:10px 14px}
  .brand{display:flex;flex-direction:column;line-height:1.05;flex:1;min-width:0}
  .brand .k{font-size:10px;letter-spacing:.22em;color:var(--accent-dim);text-transform:uppercase;font-weight:700}
  .brand .t{font-size:15px;font-weight:800;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .iconbtn{
    background:var(--panel-2);border:1px solid var(--line);color:var(--txt);
    width:42px;height:42px;border-radius:11px;font-size:19px;display:grid;place-items:center;
    cursor:pointer;flex:none;
  }
  .iconbtn:active{transform:scale(.94)}
  .saveflag{
    font-size:11px;color:var(--accent);font-weight:700;letter-spacing:.04em;
    opacity:0;transition:opacity .25s;white-space:nowrap;
  }
  .saveflag.show{opacity:1}

  main{max-width:760px;margin:0 auto;padding:14px}

  /* ---------- header fields ---------- */
  .head-card{
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:16px;
    box-shadow:var(--shadow);
  }
  .field-lbl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 5px 2px;display:block}
  input[type=text],input[type=date],input[type=time],textarea{
    width:100%;background:var(--bg);border:1px solid var(--line);border-radius:11px;
    color:var(--txt);padding:12px 12px;font-size:16px;font-family:inherit;outline:none;
  }
  input:focus,textarea:focus{border-color:var(--accent-dim);box-shadow:0 0 0 3px rgba(198,242,78,.12)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .now-btn{
    margin-top:10px;width:100%;background:transparent;border:1px dashed var(--accent-dim);
    color:var(--accent);border-radius:11px;padding:10px;font-weight:700;font-size:13px;cursor:pointer;
    letter-spacing:.03em;
  }
  .now-btn:active{background:rgba(198,242,78,.08)}

  /* ---------- sections ---------- */
  details.sec{
    background:var(--panel);border:1px solid var(--line);border-radius:16px;
    margin-bottom:12px;overflow:hidden;
  }
  details.sec[open]{box-shadow:var(--shadow)}
  summary.sec-head{
    list-style:none;cursor:pointer;padding:15px 16px;display:flex;align-items:center;gap:12px;
    background:linear-gradient(90deg,rgba(198,242,78,.05),transparent);
  }
  summary.sec-head::-webkit-details-marker{display:none}
  .sec-num{
    font-size:12px;font-weight:800;color:var(--bg);background:var(--accent);
    border-radius:8px;min-width:26px;height:26px;display:grid;place-items:center;flex:none;
  }
  .sec-title{font-weight:800;font-size:15px;letter-spacing:.01em;flex:1}
  .sec-count{font-size:11px;color:var(--muted);font-weight:700}
  .chev{color:var(--muted);transition:transform .2s;font-size:13px}
  details[open] .chev{transform:rotate(90deg)}
  .sec-body{padding:6px 12px 14px}

  /* ---------- binary rows ---------- */
  .row{padding:10px 4px;border-top:1px solid rgba(42,53,43,.6)}
  .row:first-child{border-top:none}
  .row-top{display:flex;align-items:center;gap:10px}
  .row-lbl{flex:1;font-size:15px;font-weight:600}
  .toggle{display:flex;gap:6px;flex:none}
  .tg{
    border:1px solid var(--line);background:var(--panel-2);color:var(--muted);
    padding:9px 14px;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;
    letter-spacing:.05em;min-width:54px;text-align:center;
  }
  .tg:active{transform:scale(.95)}
  .tg.sim.on{background:var(--sim);color:#06210f;border-color:var(--sim)}
  .tg.nao.on{background:var(--nao);color:#2a0b07;border-color:var(--nao)}

  /* choice chips */
  .chips{display:flex;flex-wrap:wrap;gap:6px;flex:none}
  .chip{
    border:1px solid var(--line);background:var(--panel-2);color:var(--muted);
    padding:9px 13px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;
  }
  .chip:active{transform:scale(.95)}
  .chip.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}

  .obs-wrap{margin-top:8px;display:none}
  .obs-wrap.show{display:block}
  textarea{min-height:42px;resize:vertical;font-size:15px}
  .obs-toggle{
    background:none;border:none;color:var(--accent-dim);font-size:12px;font-weight:700;
    cursor:pointer;padding:4px 2px;letter-spacing:.04em;
  }

  .outro-wrap{margin-top:8px;display:none}
  .outro-wrap.show{display:block}

  /* photo checklist */
  .photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .ph{
    display:flex;align-items:center;gap:10px;background:var(--panel-2);border:1px solid var(--line);
    border-radius:11px;padding:11px 12px;cursor:pointer;font-size:14px;font-weight:600;
  }
  .ph .box{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex:none;display:grid;place-items:center;font-size:14px;color:var(--bg)}
  .ph.on{border-color:var(--accent);background:rgba(198,242,78,.08)}
  .ph.on .box{background:var(--accent);border-color:var(--accent)}

  /* gps */
  .gps-row{display:flex;gap:8px}
  .gps-row input{flex:1}
  .gps-btn{flex:none;width:52px;border:1px solid var(--accent-dim);background:rgba(198,242,78,.08);color:var(--accent);border-radius:11px;font-size:20px;cursor:pointer}
  .gps-btn:active{transform:scale(.95)}
  .gps-btn.loading{opacity:.5;pointer-events:none}
  .gps-meta{font-size:12px;color:var(--muted);margin-top:7px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .gps-meta a{color:var(--accent);text-decoration:none;font-weight:700}

  /* fotos */
  .pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
  .pthumb{position:relative;aspect-ratio:1/1;border-radius:11px;overflow:hidden;border:1px solid var(--line);background:var(--panel-2);cursor:pointer}
  .pthumb img{width:100%;height:100%;object-fit:cover;display:block}
  .pthumb .cap{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(transparent,rgba(0,0,0,.82));color:#fff;font-size:10px;padding:12px 6px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .padd{display:flex;flex-direction:column;gap:3px;align-items:center;justify-content:center;aspect-ratio:1/1;border:1.5px dashed var(--accent-dim);border-radius:11px;color:var(--accent);font-size:12px;font-weight:700;text-align:center;cursor:pointer;line-height:1.15;padding:6px}
  .padd .ic{font-size:26px}
  /* viewer */
  .viewer{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.95);display:none;flex-direction:column}
  .viewer.show{display:flex}
  .viewer .vtop{display:flex;justify-content:flex-end;padding:env(safe-area-inset-top) 12px 0}
  .viewer .vclose{background:rgba(255,255,255,.12);border:none;color:#fff;width:44px;height:44px;border-radius:12px;font-size:20px;cursor:pointer;margin-top:8px}
  .viewer .vimg{flex:1;display:grid;place-items:center;overflow:auto;padding:10px}
  .viewer .vimg img{max-width:100%;max-height:100%;border-radius:8px}
  .viewer .vbottom{padding:10px 14px calc(16px + env(safe-area-inset-bottom));display:flex;gap:8px}
  .viewer .vbottom input{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#fff;border-radius:11px;padding:12px;font-size:15px}
  .viewer .vdel{flex:none;background:var(--nao);color:#2a0b07;border:none;border-radius:11px;padding:0 16px;font-weight:800;cursor:pointer}

  /* ---------- bottom action bar ---------- */
  .fab{
    position:fixed;left:0;right:0;bottom:0;z-index:60;
    background:linear-gradient(180deg,transparent,var(--bg) 30%);
    padding:14px 14px calc(14px + env(safe-area-inset-bottom));
    display:flex;gap:10px;max-width:760px;margin:0 auto;
  }
  .btn{
    flex:1;border:none;border-radius:13px;padding:15px;font-weight:800;font-size:14px;
    cursor:pointer;letter-spacing:.03em;
  }
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--accent);color:var(--bg)}
  .btn-ghost{background:var(--panel-2);color:var(--txt);border:1px solid var(--line);flex:none;width:56px;font-size:20px}

  /* ---------- modal / drawer ---------- */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;backdrop-filter:blur(2px)}
  .overlay.show{display:block}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:101;background:var(--panel);
    border-radius:20px 20px 0 0;border-top:1px solid var(--line);
    max-height:82vh;overflow:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1);
    padding:8px 16px calc(20px + env(safe-area-inset-bottom));
    max-width:760px;margin:0 auto;
  }
  .sheet.show{transform:translateY(0)}
  .grab{width:44px;height:5px;border-radius:3px;background:var(--line);margin:8px auto 12px}
  .sheet h2{font-size:16px;margin:4px 2px 12px;letter-spacing:.02em}
  .rec{
    display:flex;align-items:center;gap:10px;padding:13px;border:1px solid var(--line);
    border-radius:13px;margin-bottom:9px;background:var(--panel-2);
  }
  .rec.active{border-color:var(--accent);background:rgba(198,242,78,.06)}
  .rec-info{flex:1;min-width:0}
  .rec-name{font-weight:800;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rec-sub{font-size:11px;color:var(--muted);margin-top:2px}
  .rec-del{background:none;border:none;color:var(--nao);font-size:18px;cursor:pointer;padding:6px}
  .sheet-btn{
    width:100%;border:1px solid var(--line);background:var(--panel-2);color:var(--txt);
    border-radius:12px;padding:14px;font-weight:700;font-size:14px;cursor:pointer;margin-top:8px;
    display:flex;align-items:center;gap:10px;justify-content:center;
  }
  .sheet-btn.accent{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  .hint{font-size:12px;color:var(--muted);line-height:1.5;margin:10px 2px;text-align:center}
  .divider{height:1px;background:var(--line);margin:16px 0 8px}

  /* print */
  @media print{
    header.app,.fab,.overlay,.sheet,.now-btn,.obs-toggle{display:none!important}
    body{background:#fff;color:#000;padding:0}
    details.sec{break-inside:avoid;border:1px solid #999;box-shadow:none}
    details.sec:not([open]) .sec-body{display:block}
    .obs-wrap{display:block!important}
    .tg{border:1px solid #999;color:#999}
    .tg.on{outline:2px solid #000}
  }
</style>
</head>
<body>

<header class="app">
  <div class="bar">
    <button class="iconbtn" id="btnRecords" title="Fichas">≡</button>
    <div class="brand">
      <span class="k">Bioespeleologia</span>
      <span class="t" id="curName">Nova ficha</span>
    </div>
    <span class="saveflag" id="saveFlag">Salvo ✓</span>
    <button class="iconbtn" id="btnMenu" title="Opções">⋯</button>
  </div>
</header>

<main>
  <div class="head-card">
    <label class="field-lbl">Caverna</label>
    <input type="text" id="f_caverna" placeholder="Nome / código da caverna" autocomplete="off">
    <div class="grid2" style="margin-top:10px">
      <div>
        <label class="field-lbl">Data</label>
        <input type="date" id="f_data">
      </div>
      <div>
        <label class="field-lbl">Hora</label>
        <input type="time" id="f_hora">
      </div>
    </div>
    <button class="now-btn" id="btnNow">⏱ Preencher data e hora atuais</button>
    <div style="margin-top:12px">
      <label class="field-lbl">Coordenadas (GPS)</label>
      <div class="gps-row">
        <input type="text" id="f_coord" placeholder="latitude, longitude" autocomplete="off" inputmode="decimal">
        <button class="gps-btn" id="btnGps" title="Pegar GPS">📍</button>
      </div>
      <div class="gps-meta" id="gpsMeta"></div>
    </div>
  </div>

  <div id="sections"></div>

  <div class="head-card">
    <label class="field-lbl">Fotos da ficha</label>
    <div class="pgrid" id="photoGrid"></div>
    <input type="file" id="camInput" accept="image/*" capture="environment" multiple style="display:none">
  </div>
</main>

<div class="fab">
  <button class="btn btn-primary" id="btnNew">＋ Nova ficha</button>
  <button class="btn btn-ghost" id="btnPrint" title="Imprimir / PDF">🖨</button>
</div>

<!-- records sheet -->
<div class="overlay" id="ovRecords"></div>
<div class="sheet" id="shRecords">
  <div class="grab"></div>
  <h2>Fichas salvas</h2>
  <div id="recList"></div>
  <button class="sheet-btn accent" id="btnNew2">＋ Criar nova ficha</button>
  <div class="hint">As fichas ficam salvas neste celular automaticamente. Faça backup pelo menu ⋯ de vez em quando.</div>
</div>

<!-- menu sheet -->
<div class="overlay" id="ovMenu"></div>
<div class="sheet" id="shMenu">
  <div class="grab"></div>
  <h2>Opções</h2>
  <button class="sheet-btn" id="mExportAll">⬇ Exportar backup (todas as fichas .json)</button>
  <button class="sheet-btn" id="mExportOne">📄 Exportar esta ficha (.json)</button>
  <button class="sheet-btn" id="mExportXlsx">📊 Exportar planilha Excel (.xlsx)</button>
  <button class="sheet-btn" id="mImport">⬆ Importar backup (.json)</button>
  <button class="sheet-btn" id="mPrint">🖨 Imprimir / Salvar em PDF</button>
  <div class="divider"></div>
  <button class="sheet-btn" id="mDup">⧉ Duplicar esta ficha</button>
  <button class="sheet-btn" id="mClear" style="color:var(--nao)">🗑 Apagar esta ficha</button>
  <div class="hint">Dica: adicione esta página à tela inicial do celular para abrir como app.</div>
  <input type="file" id="fileInput" accept=".json,application/json" style="display:none">
</div>

<!-- photo viewer -->
<div class="viewer" id="viewer">
  <div class="vtop"><button class="vclose" id="vClose">✕</button></div>
  <div class="vimg"><img id="vImg" alt=""></div>
  <div class="vbottom">
    <input type="text" id="vCap" placeholder="Legenda (ex.: Entrada, Guano, conduto...)">
    <button class="vdel" id="vDel">Apagar</button>
  </div>
</div>

<script src="xlsx.full.min.js"></script>
<script>
"use strict";

/* ============ ESTRUTURA DA FICHA (espelha o PDF) ============ */
const SCHEMA = [
  { id:"cab", title:"Cabeçalho", fields:[
    { key:"obs_diurnas", label:"Observações diurnas", type:"binary", obs:false },
    { key:"capturas", label:"Capturas", type:"choice", options:["Puçá","Rede","Outro"], outro:true, obs:false },
  ]},
  { id:"aporte", title:"Aporte energético", fields:[
    { key:"carcaca", label:"Carcaça", type:"binary" },
    { key:"guano", label:"Guano", type:"binary" },
    { key:"ninho_inv", label:"Ninho invertebrado", type:"binary" },
    { key:"ninho_vert", label:"Ninho vertebrado", type:"binary" },
    { key:"rizotema", label:"Rizotema", type:"binary" },
    { key:"bryophytas", label:"Bryophytas", type:"binary" },
    { key:"fezes_vert", label:"Fezes vertebrados", type:"binary" },
    { key:"raizes", label:"Raízes", type:"binary" },
    { key:"galhos", label:"Galhos", type:"binary" },
    { key:"folhas", label:"Folhas", type:"binary" },
    { key:"plantulas", label:"Plântulas", type:"binary" },
    { key:"pelotas", label:"Pelotas", type:"binary" },
    { key:"lixeira_formiga", label:"Lixeira de formiga", type:"binary" },
    { key:"deposito_asas", label:"Depósito de asas", type:"binary" },
    { key:"aporte_outros", label:"Outros", type:"binary" },
  ]},
  { id:"fauna", title:"Fauna Silvestre Vertebrado", fields:[
    { key:"morcegos", label:"Morcegos", type:"binary" },
    { key:"aves", label:"Aves", type:"binary" },
    { key:"anfibios", label:"Anfíbios", type:"binary" },
    { key:"repteis", label:"Répteis", type:"binary" },
  ]},
  { id:"amb", title:"Características Ambientais", fields:[
    { key:"zona_afotica", label:"Zona afótica", type:"binary" },
    { key:"claraboia", label:"Claraboia", type:"binary" },
    { key:"hidrologia", label:"Hidrologia", type:"choice", options:["Drenagem","Lago","Seca"], obs:true },
    { key:"desenvolvimento", label:"Desenvolvimento", type:"choice", options:["Ascendente","Descendente"], obs:true },
    { key:"chuva", label:"Chuva", type:"binary" },
  ]},
  { id:"relev", title:"Atributos para Relevância", fields:[
    { key:"interacoes_unicas", label:"Interações ecológicas únicas", type:"binary" },
    { key:"funcao_ecol", label:"Pop. função ecol. importante", type:"binary" },
    { key:"nidificacao", label:"Local de nidificação", type:"binary" },
    { key:"residente_quir", label:"Pop. residente quiróptero", type:"binary" },
    { key:"tamanho_excep", label:"Pop. excepcional (tamanho)", type:"binary" },
    { key:"migratorias", label:"Espécies migratórias", type:"binary" },
    { key:"singularidade", label:"Singularidade da fauna", type:"binary" },
    { key:"batcave", label:"BatCave / HotCave", type:"binary" },
  ]},
  { id:"foto", title:"Registro Fotográfico", fields:[
    { key:"ph_entrada", label:"Entrada", type:"photo" },
    { key:"ph_area_entrada", label:"Área próximo entrada", type:"photo" },
    { key:"ph_primeiro_conduto", label:"Primeiro conduto", type:"photo" },
    { key:"ph_demais_condutos", label:"Demais condutos", type:"photo" },
    { key:"ph_atividades", label:"Atividades", type:"photo" },
    { key:"ph_placa", label:"Placa de identificação", type:"photo" },
    { key:"ph_aporte", label:"Aporte energético", type:"photo" },
    { key:"ph_vert_inv", label:"Vertebrados / invertebrados", type:"photo" },
  ]},
];

/* ============ ARMAZENAMENTO ============ */
const LS_KEY = "bioespeleo_records_v1";
const LS_CUR = "bioespeleo_current_v1";

function loadAll(){
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveAll(obj){
  try { localStorage.setItem(LS_KEY, JSON.stringify(obj)); return true; }
  catch(e){ alert("Não foi possível salvar (armazenamento cheio ou bloqueado)."); return false; }
}
function uid(){ return "r"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function newRecord(){
  const now = new Date();
  const pad = n => String(n).padStart(2,"0");
  return {
    id: uid(),
    values: {
      f_data: `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`,
      f_hora: `${pad(now.getHours())}:${pad(now.getMinutes())}`,
    },
    created: now.toISOString(),
    updated: now.toISOString(),
    photos: [],
  };
}

let records = loadAll();
let currentId = localStorage.getItem(LS_CUR);
if(!currentId || !records[currentId]){
  const r = newRecord();
  records[r.id] = r;
  currentId = r.id;
  saveAll(records);
  localStorage.setItem(LS_CUR, currentId);
}

function cur(){ return records[currentId]; }
function val(k){ return cur().values[k]; }

let saveTimer=null;
function touchSave(){
  cur().updated = new Date().toISOString();
  saveAll(records);
  localStorage.setItem(LS_CUR, currentId);
  flagSaved();
  refreshTitle();
}
function setVal(k,v){
  if(v===undefined||v===null||v===""||v===false){ delete cur().values[k]; }
  else { cur().values[k]=v; }
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer=setTimeout(touchSave,250);
}

const saveFlag = document.getElementById("saveFlag");
let flagTimer=null;
function flagSaved(){
  saveFlag.classList.add("show");
  if(flagTimer) clearTimeout(flagTimer);
  flagTimer=setTimeout(()=>saveFlag.classList.remove("show"),1200);
}

/* ============ RENDER ============ */
const secWrap = document.getElementById("sections");

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));}

function buildSections(){
  secWrap.innerHTML="";
  SCHEMA.forEach((sec,i)=>{
    const d=document.createElement("details");
    d.className="sec";
    if(i<2) d.open=true;
    d.innerHTML=`
      <summary class="sec-head">
        <span class="sec-num">${i+1}</span>
        <span class="sec-title">${sec.title}</span>
        <span class="sec-count" data-count="${sec.id}"></span>
        <span class="chev">▶</span>
      </summary>
      <div class="sec-body" data-body="${sec.id}"></div>`;
    secWrap.appendChild(d);
    const body=d.querySelector(`[data-body="${sec.id}"]`);
    if(sec.id==="foto"){
      const g=document.createElement("div"); g.className="photo-grid";
      sec.fields.forEach(f=>g.appendChild(renderPhoto(f)));
      body.appendChild(g);
    } else {
      sec.fields.forEach(f=>body.appendChild(renderField(f)));
    }
  });
  updateCounts();
}

function renderField(f){
  const row=document.createElement("div"); row.className="row";
  const top=document.createElement("div"); top.className="row-top";
  const lbl=document.createElement("div"); lbl.className="row-lbl"; lbl.textContent=f.label;
  top.appendChild(lbl);

  if(f.type==="binary"){
    const tg=document.createElement("div"); tg.className="toggle";
    ["sim","nao"].forEach(opt=>{
      const b=document.createElement("button");
      b.className="tg "+opt;
      b.textContent=opt==="sim"?"SIM":"NÃO";
      if(val(f.key)===opt) b.classList.add("on");
      b.onclick=()=>{
        const nv = val(f.key)===opt ? null : opt;
        setVal(f.key,nv);
        tg.querySelectorAll(".tg").forEach(x=>x.classList.remove("on"));
        if(nv) b.classList.add("on");
        updateCounts();
      };
      tg.appendChild(b);
    });
    top.appendChild(tg);
  } else if(f.type==="choice"){
    const chips=document.createElement("div"); chips.className="chips";
    f.options.forEach(opt=>{
      const c=document.createElement("button");
      c.className="chip";
      c.textContent=opt;
      if(val(f.key)===opt) c.classList.add("on");
      c.onclick=()=>{
        const nv = val(f.key)===opt ? null : opt;
        setVal(f.key,nv);
        chips.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
        if(nv) c.classList.add("on");
        if(f.outro) toggleOutro(opt==="Outro" && nv);
        updateCounts();
      };
      chips.appendChild(c);
    });
    top.appendChild(chips);
  }
  row.appendChild(top);

  // campo "Outro" texto
  if(f.outro){
    const ow=document.createElement("div"); ow.className="outro-wrap"; ow.dataset.outro=f.key;
    const inp=document.createElement("input"); inp.type="text"; inp.placeholder="Especificar outro método";
    inp.value=val(f.key+"__outro")||"";
    inp.oninput=()=>setVal(f.key+"__outro",inp.value);
    ow.appendChild(inp);
    row.appendChild(ow);
    if(val(f.key)==="Outro") ow.classList.add("show");
  }

  // observação
  if(f.obs!==false){
    const tgl=document.createElement("button"); tgl.className="obs-toggle"; tgl.textContent="+ Obs.";
    const ow=document.createElement("div"); ow.className="obs-wrap";
    const ta=document.createElement("textarea"); ta.placeholder="Observações…";
    ta.value=val(f.key+"__obs")||"";
    ta.oninput=()=>setVal(f.key+"__obs",ta.value);
    ow.appendChild(ta);
    tgl.onclick=()=>{ ow.classList.toggle("show"); if(ow.classList.contains("show")) ta.focus(); };
    if(val(f.key+"__obs")) ow.classList.add("show");
    row.appendChild(tgl);
    row.appendChild(ow);
  }
  return row;
}

function renderPhoto(f){
  const el=document.createElement("div"); el.className="ph";
  if(val(f.key)) el.classList.add("on");
  el.innerHTML=`<span class="box">✓</span><span>${f.label}</span>`;
  el.onclick=()=>{
    const nv=!val(f.key);
    setVal(f.key,nv);
    el.classList.toggle("on",nv);
    updateCounts();
  };
  return el;
}

function toggleOutro(show){
  document.querySelectorAll("[data-outro]").forEach(w=>{
    w.classList.toggle("show", !!show);
  });
}

function updateCounts(){
  SCHEMA.forEach(sec=>{
    let filled=0;
    sec.fields.forEach(f=>{
      const v=val(f.key);
      if(v!==undefined && v!==null && v!=="" && v!==false) filled++;
    });
    const el=document.querySelector(`[data-count="${sec.id}"]`);
    if(el) el.textContent = filled ? `${filled}/${sec.fields.length}` : "";
  });
}

/* header fields */
function bindHeader(){
  ["f_caverna","f_data","f_hora"].forEach(id=>{
    const el=document.getElementById(id);
    el.value = val(id)||"";
    el.oninput=()=>{ setVal(id, el.value); refreshTitle(); };
  });
}
function refreshTitle(){
  document.getElementById("curName").textContent = val("f_caverna") || "Ficha sem nome";
}

document.getElementById("btnNow").onclick=()=>{
  const now=new Date(); const pad=n=>String(n).padStart(2,"0");
  const d=`${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const h=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
  document.getElementById("f_data").value=d; setVal("f_data",d);
  document.getElementById("f_hora").value=h; setVal("f_hora",h);
};

function loadCurrentIntoUI(){
  bindHeader();
  bindGps();
  buildSections();
  renderPhotos();
  refreshTitle();
}

/* ============ SHEETS / MODAIS ============ */
function openSheet(ov,sh){ document.getElementById(ov).classList.add("show"); document.getElementById(sh).classList.add("show"); }
function closeSheet(ov,sh){ document.getElementById(ov).classList.remove("show"); document.getElementById(sh).classList.remove("show"); }

document.getElementById("ovRecords").onclick=()=>closeSheet("ovRecords","shRecords");
document.getElementById("ovMenu").onclick=()=>closeSheet("ovMenu","shMenu");

function fmtDate(iso){ try{const d=new Date(iso);return d.toLocaleDateString("pt-BR")+" "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});}catch(e){return"";} }

function buildRecList(){
  const list=document.getElementById("recList"); list.innerHTML="";
  const ids=Object.keys(records).sort((a,b)=> (records[b].updated||"").localeCompare(records[a].updated||""));
  if(ids.length===0){ list.innerHTML='<div class="hint">Nenhuma ficha ainda.</div>'; return; }
  ids.forEach(id=>{
    const r=records[id];
    const div=document.createElement("div");
    div.className="rec"+(id===currentId?" active":"");
    div.innerHTML=`<div class="rec-info">
        <div class="rec-name">${escapeHtml(r.values.f_caverna||"Ficha sem nome")}</div>
        <div class="rec-sub">${r.values.f_data||""} • atualizada ${fmtDate(r.updated)}</div>
      </div>
      <button class="rec-del" title="Apagar">🗑</button>`;
    div.querySelector(".rec-info").onclick=()=>{
      currentId=id; localStorage.setItem(LS_CUR,id);
      loadCurrentIntoUI(); closeSheet("ovRecords","shRecords");
      window.scrollTo({top:0,behavior:"smooth"});
    };
    div.querySelector(".rec-del").onclick=async (e)=>{
      e.stopPropagation();
      if(!confirm(`Apagar a ficha "${r.values.f_caverna||"sem nome"}"?`)) return;
      for(const pid of (r.photos||[])){ try{ await idbDel(pid); }catch(e2){} }
      delete records[id]; saveAll(records);
      if(id===currentId){
        const rest=Object.keys(records);
        if(rest.length){ currentId=rest[0]; } else { const nr=newRecord(); records[nr.id]=nr; currentId=nr.id; saveAll(records); }
        localStorage.setItem(LS_CUR,currentId); loadCurrentIntoUI();
      }
      buildRecList();
    };
    list.appendChild(div);
  });
}

document.getElementById("btnRecords").onclick=()=>{ buildRecList(); openSheet("ovRecords","shRecords"); };
document.getElementById("btnMenu").onclick=()=>openSheet("ovMenu","shMenu");

function createNew(){
  const r=newRecord(); records[r.id]=r; currentId=r.id;
  saveAll(records); localStorage.setItem(LS_CUR,currentId);
  loadCurrentIntoUI();
  window.scrollTo({top:0,behavior:"smooth"});
  document.getElementById("f_caverna").focus();
}
document.getElementById("btnNew").onclick=()=>{ if(confirm("Criar uma nova ficha em branco?")) createNew(); };
document.getElementById("btnNew2").onclick=()=>{ closeSheet("ovRecords","shRecords"); createNew(); };

/* ============ EXPORT / IMPORT / PRINT ============ */
function download(filename,text){
  const blob=new Blob([text],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}
function stamp(){ const d=new Date(); const p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}_${p(d.getHours())}${p(d.getMinutes())}`; }

document.getElementById("mExportAll").onclick=async ()=>{
  const photos=await gatherPhotos(Object.keys(records));
  download(`bioespeleo_backup_${stamp()}.json`, JSON.stringify({type:"bioespeleo_backup",version:2,records,photos},null,2));
  closeSheet("ovMenu","shMenu");
};
document.getElementById("mExportOne").onclick=async ()=>{
  const nm=(cur().values.f_caverna||"ficha").replace(/[^\w\-]+/g,"_");
  const photos=await gatherPhotos([currentId]);
  download(`bioespeleo_${nm}_${stamp()}.json`, JSON.stringify({type:"bioespeleo_single",version:2,record:cur(),photos},null,2));
  closeSheet("ovMenu","shMenu");
};
document.getElementById("mExportXlsx").onclick=()=>{ closeSheet("ovMenu","shMenu"); exportXlsx(); };

async function exportXlsx(){
  if(typeof XLSX==="undefined"){
    alert("A biblioteca de planilha ainda não foi carregada. Abra o app uma vez com internet para baixá-la (depois funciona offline).");
    return;
  }
  const headCols=["Caverna","Data","Hora","Coordenadas","Precisão (m)","Altitude (m)"];
  const fieldRefs=[]; const fieldCols=[];
  SCHEMA.forEach(sec=>sec.fields.forEach(f=>{
    fieldRefs.push(f);
    fieldCols.push(f.type==="photo" ? "Foto: "+f.label : f.label);
  }));
  const tailCols=["Observações","Nº fotos","Legendas das fotos"];
  const cols=[...headCols,...fieldCols,...tailCols];
  const rows=[cols];

  const ids=Object.keys(records).sort((a,b)=>(records[b].updated||"").localeCompare(records[a].updated||""));
  for(const id of ids){
    const r=records[id]; const v=r.values||{};
    const row=[ v.f_caverna||"", v.f_data||"", v.f_hora||"", v.f_coord||"",
                (v.f_acc!=null?v.f_acc:""), (v.f_alt!=null?v.f_alt:"") ];
    const obs=[];
    fieldRefs.forEach(f=>{
      const val=v[f.key];
      if(f.type==="binary"){ row.push(val==="sim"?"Sim":(val==="nao"?"Não":"")); }
      else if(f.type==="choice"){ let s=val||""; if(f.outro && val==="Outro" && v[f.key+"__outro"]) s+=" ("+v[f.key+"__outro"]+")"; row.push(s); }
      else if(f.type==="photo"){ row.push(val?"Sim":""); }
      const o=v[f.key+"__obs"]; if(o) obs.push(f.label+": "+o);
    });
    row.push(obs.join(" | "));
    const ph=r.photos||[]; row.push(ph.length);
    const caps=[];
    for(const pid of ph){ try{ const p=await idbGet(pid); if(p&&p.cap) caps.push(p.cap); }catch(e){} }
    row.push(caps.join(" | "));
    rows.push(row);
  }

  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"]=cols.map((c,i)=>({ wch: i<6 ? 16 : Math.min(Math.max(c.length+2,12),40) }));
  ws["!freeze"]={xSplit:0,ySplit:1};
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Fichas");
  try{
    const out=XLSX.write(wb,{bookType:"xlsx",type:"array"});
    const blob=new Blob([out],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`bioespeleo_${stamp()}.xlsx`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1500);
  }catch(e){ alert("Erro ao gerar a planilha: "+e.message); }
}
document.getElementById("mImport").onclick=()=>document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange=(e)=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async ()=>{
    try{
      const data=JSON.parse(reader.result);
      let added=0;
      if(data.type==="bioespeleo_backup" && data.records){
        Object.values(data.records).forEach(r=>{ if(!r.id) r.id=uid(); records[r.id]=r; added++; });
      } else if(data.type==="bioespeleo_single" && data.record){
        const r=data.record; if(!r.id) r.id=uid(); records[r.id]=r; added++;
      } else { alert("Arquivo não reconhecido."); return; }
      saveAll(records);
      if(data.photos){ for(const pid in data.photos){ try{ await idbPut(data.photos[pid]); }catch(e){} } }
      buildRecList(); renderPhotos();
      alert(`${added} ficha(s) importada(s).`);
    }catch(err){ alert("Erro ao ler o arquivo: "+err.message); }
  };
  reader.readAsText(file);
  e.target.value="";
};

document.getElementById("btnPrint").onclick=()=>{ document.querySelectorAll("details.sec").forEach(d=>d.open=true); setTimeout(()=>window.print(),200); };

document.getElementById("mDup").onclick=async ()=>{
  const copy=JSON.parse(JSON.stringify(cur()));
  copy.id=uid(); copy.created=new Date().toISOString(); copy.updated=copy.created;
  copy.values.f_caverna=(copy.values.f_caverna||"Ficha")+" (cópia)";
  if(copy.photos && copy.photos.length){
    const newIds=[];
    for(const pid of copy.photos){
      try{ const p=await idbGet(pid); if(p){ const np=photoId(); await idbPut({...p,id:np,recordId:copy.id}); newIds.push(np); } }catch(e){}
    }
    copy.photos=newIds;
  }
  records[copy.id]=copy; currentId=copy.id;
  saveAll(records); localStorage.setItem(LS_CUR,currentId);
  loadCurrentIntoUI(); closeSheet("ovMenu","shMenu");
};
document.getElementById("mClear").onclick=async ()=>{
  if(!confirm("Apagar esta ficha permanentemente?")) return;
  for(const pid of (cur().photos||[])){ try{ await idbDel(pid); }catch(e){} }
  delete records[currentId];
  const rest=Object.keys(records);
  if(rest.length){ currentId=rest[0]; } else { const nr=newRecord(); records[nr.id]=nr; currentId=nr.id; }
  saveAll(records); localStorage.setItem(LS_CUR,currentId);
  loadCurrentIntoUI(); closeSheet("ovMenu","shMenu");
};

/* ============ GPS ============ */
function bindGps(){
  const inp=document.getElementById("f_coord");
  inp.value=val("f_coord")||"";
  inp.oninput=()=>{ setVal("f_coord",inp.value); renderGpsMeta(); };
  renderGpsMeta();
  const btn=document.getElementById("btnGps");
  btn.onclick=()=>{
    if(!navigator.geolocation){ alert("Este dispositivo não fornece GPS ao navegador."); return; }
    btn.classList.add("loading"); btn.textContent="…";
    navigator.geolocation.getCurrentPosition(pos=>{
      const c=pos.coords;
      const coord=`${c.latitude.toFixed(6)}, ${c.longitude.toFixed(6)}`;
      inp.value=coord; setVal("f_coord",coord);
      setVal("f_acc", c.accuracy!=null?Math.round(c.accuracy):null);
      setVal("f_alt", c.altitude!=null?Math.round(c.altitude):null);
      renderGpsMeta();
      btn.classList.remove("loading"); btn.textContent="📍";
    }, err=>{
      btn.classList.remove("loading"); btn.textContent="📍";
      alert("Não foi possível obter o GPS: "+err.message+"\n(Em caverna o sinal cai — pegue a coordenada na entrada, ou digite manualmente.)");
    }, {enableHighAccuracy:true, timeout:20000, maximumAge:0});
  };
}
function renderGpsMeta(){
  const m=document.getElementById("gpsMeta"); m.innerHTML="";
  const acc=val("f_acc"), alt=val("f_alt"), coord=val("f_coord");
  const parts=[];
  if(acc!=null) parts.push(`precisão ±${acc} m`);
  if(alt!=null) parts.push(`alt. ${alt} m`);
  if(parts.length) m.appendChild(document.createTextNode(parts.join("   •   ")));
  if(coord){
    const ll=coord.split(",").map(s=>s.trim());
    if(ll.length===2 && ll[0] && ll[1]){
      const a=document.createElement("a");
      a.href=`geo:${ll[0]},${ll[1]}?q=${ll[0]},${ll[1]}`;
      a.textContent="▸ abrir no mapa";
      m.appendChild(a);
    }
  }
}

/* ============ FOTOS (IndexedDB) ============ */
let _db=null;
function openDB(){
  return new Promise((res,rej)=>{
    if(_db) return res(_db);
    if(!("indexedDB" in window)) return rej(new Error("IndexedDB indisponível"));
    const req=indexedDB.open("bioespeleo_photos",1);
    req.onupgradeneeded=e=>{ const d=e.target.result; if(!d.objectStoreNames.contains("photos")) d.createObjectStore("photos",{keyPath:"id"}); };
    req.onsuccess=e=>{ _db=e.target.result; res(_db); };
    req.onerror=e=>rej(e.target.error);
  });
}
function idbPut(p){ return openDB().then(d=>new Promise((res,rej)=>{const tx=d.transaction("photos","readwrite");tx.objectStore("photos").put(p);tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error);})); }
function idbGet(id){ return openDB().then(d=>new Promise((res,rej)=>{const tx=d.transaction("photos","readonly");const r=tx.objectStore("photos").get(id);r.onsuccess=()=>res(r.result);r.onerror=e=>rej(e.target.error);})); }
function idbDel(id){ return openDB().then(d=>new Promise((res,rej)=>{const tx=d.transaction("photos","readwrite");tx.objectStore("photos").delete(id);tx.oncomplete=()=>res();tx.onerror=e=>rej(e.target.error);})); }
function photoId(){ return "p"+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function compressImage(file,maxDim,quality){
  return new Promise((res,rej)=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      URL.revokeObjectURL(url);
      let w=img.naturalWidth, h=img.naturalHeight;
      if(w>=h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
      else if(h>w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      res(cv.toDataURL("image/jpeg",quality));
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error("imagem inválida")); };
    img.src=url;
  });
}

document.getElementById("camInput").onchange=async (e)=>{
  const files=[...e.target.files]; e.target.value="";
  if(!files.length) return;
  for(const f of files){
    try{
      const data=await compressImage(f,1280,0.6);
      const pid=photoId();
      await idbPut({id:pid,recordId:currentId,data,cap:"",ts:new Date().toISOString()});
      if(!cur().photos) cur().photos=[];
      cur().photos.push(pid);
      touchSave();
    }catch(err){ alert("Erro ao processar foto: "+err.message); }
  }
  renderPhotos();
};

async function renderPhotos(){
  const grid=document.getElementById("photoGrid");
  grid.innerHTML="";
  const add=document.createElement("div");
  add.className="padd";
  add.innerHTML='<span class="ic">＋</span><span>Tirar / escolher</span>';
  add.onclick=()=>document.getElementById("camInput").click();
  grid.appendChild(add);
  const ids=(cur().photos||[]);
  for(const pid of ids){
    const cell=document.createElement("div"); cell.className="pthumb";
    grid.appendChild(cell);
    try{
      const p=await idbGet(pid);
      if(!p){ cell.remove(); continue; }
      const img=document.createElement("img"); img.src=p.data; img.alt=p.cap||""; cell.appendChild(img);
      if(p.cap){ const cap=document.createElement("div"); cap.className="cap"; cap.textContent=p.cap; cell.appendChild(cap); }
      cell.onclick=()=>openViewer(pid);
    }catch(err){ cell.remove(); }
  }
}

/* viewer */
let _viewerPid=null;
function openViewer(pid){
  _viewerPid=pid;
  idbGet(pid).then(p=>{
    if(!p) return;
    document.getElementById("vImg").src=p.data;
    document.getElementById("vCap").value=p.cap||"";
    document.getElementById("viewer").classList.add("show");
  });
}
async function commitCaption(){
  if(!_viewerPid) return;
  const cap=document.getElementById("vCap").value;
  const p=await idbGet(_viewerPid);
  if(p && p.cap!==cap){ p.cap=cap; await idbPut(p); }
}
document.getElementById("vClose").onclick=async ()=>{
  await commitCaption();
  document.getElementById("viewer").classList.remove("show");
  renderPhotos();
};
document.getElementById("vDel").onclick=async ()=>{
  if(!_viewerPid) return;
  if(!confirm("Apagar esta foto?")) return;
  await idbDel(_viewerPid);
  cur().photos=(cur().photos||[]).filter(x=>x!==_viewerPid);
  touchSave();
  document.getElementById("viewer").classList.remove("show");
  renderPhotos();
};

async function gatherPhotos(ids){
  const out={};
  for(const rid of ids){
    const r=records[rid]; if(!r||!r.photos) continue;
    for(const pid of r.photos){ try{ const p=await idbGet(pid); if(p) out[pid]=p; }catch(e){} }
  }
  return out;
}
